name: Update Terminus reference data

on:
  schedule:
    # Weekly fallback poll — catches any release the dispatch trigger misses.
    - cron: "0 13 * * 1"
  workflow_dispatch: {}
  repository_dispatch:
    # Fired by pantheon-systems/terminus on release publish, once that
    # workflow step exists. Inert (never sent) until then.
    types: [terminus-release]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Update commands.json and terminusReleases.json
        run: npm run update-terminus-data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open PR if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update Terminus commands and releases data"
          title: "chore: update Terminus commands and releases data"
          body: |
            Automated update of `src/source/data/commands.json` and
            `src/source/data/terminusReleases.json` from the latest
            [Terminus release](https://github.com/pantheon-systems/terminus/releases/latest).

            Generated by `.github/workflows/update-terminus-data.yml`.
          branch: chore/update-terminus-data
          delete-branch: true
          add-paths: |
            src/source/data/commands.json
            src/source/data/terminusReleases.json
