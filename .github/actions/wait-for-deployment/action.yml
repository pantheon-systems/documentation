name: Wait for Next.js Deployment
description: Waits for a Pantheon Next.js deployment to complete by polling the build API
# A more mature way to fulfill this need will be done via https://getpantheon.atlassian.net/browse/DEVX-6685

inputs:
  pantheon_site_name:
    description: The Pantheon site name
    required: true
  env_name:
    description: The environment name (e.g., dev, pr-123)
    required: true
  max_wait_minutes:
    description: Maximum number of minutes to wait for deployment
    required: false
    default: '30'
  pantheon_machine_token:
    description: Pantheon machine token for API authentication
    required: true
  expected_commit:
    description: The expected commit hash to wait for
    required: true

outputs:
  deployment_ready:
    description: Whether the deployment completed successfully
    value: ${{ steps.wait.outputs.deployment_ready }}
  build_status:
    description: The final build status
    value: ${{ steps.wait.outputs.build_status }}

runs:
  using: 'composite'
  steps:
    - name: Setup PHP (required for Terminus)
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'

    - name: Install and authenticate Terminus
      uses: pantheon-systems/terminus-github-actions@v1
      with:
        pantheon-machine-token: ${{ inputs.pantheon_machine_token }}

    - name: Wait for Pantheon build and deployment to complete
      id: wait
      shell: bash
      env:
        PANTHEON_SITE_NAME: ${{ inputs.pantheon_site_name }}
        ENV_NAME: ${{ inputs.env_name }}
        MAX_WAIT_MINUTES: ${{ inputs.max_wait_minutes }}
        PANTHEON_MACHINE_TOKEN: ${{ inputs.pantheon_machine_token }}
        EXPECTED_COMMIT: ${{ inputs.expected_commit }}
      run: |
        terminus workflow:wait ${PANTHEON_SITE_NAME}.${ENV_NAME}  --commit=$EXPECTED_COMMIT --max=1200
